name: Deploy Auth Frontend

on:
  push:
    branches:
      - master
    paths:
      - 'amcart-auth-frontend/**'
      - '.github/workflows/deploy-auth-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./amcart-auth-frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/amcart-frontend:latest
          build-args: |
            NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
            NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
            NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}

      - name: Setup SSH Key
        run: |
          echo "${{ secrets.FRONTEND_EC2_SSH_KEY }}" | base64 -d > /tmp/ec2_key
          chmod 600 /tmp/ec2_key

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.FRONTEND_EC2_HOST }}
          username: ${{ secrets.FRONTEND_EC2_USER }}
          key_path: /tmp/ec2_key
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/amcart-frontend:latest
            docker stop amcart-auth-frontend || true
            docker rm amcart-auth-frontend || true
            docker run -d \
              --name amcart-auth-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/amcart-frontend:latest
            docker image prune -f
